name: Deploy site (GitHub Pages)

# 构建 oauth-proxy/site 下的 Hexo 静态站（落地页 + Wiki）并发布到 GitHub Pages。
# 站点地址（自定义域名）：https://linplayer.902541.xyz
# 注意：需在仓库 Settings → Pages → Build and deployment → Source 选 "GitHub Actions"。

on:
  push:
    branches: [main]
    paths:
      - 'oauth-proxy/site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个 Pages 部署；新提交取消进行中的旧部署。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oauth-proxy/site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: oauth-proxy/site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (hexo generate)
        run: npx hexo generate

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: oauth-proxy/site/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
