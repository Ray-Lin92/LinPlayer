name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0, must match a Pre-release)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Promote Pre-release to Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Pre-release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/assets
          gh release download "v${{ inputs.version }}-pre" \
            --dir /tmp/assets \
            --repo "${{ github.repository }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Release v${{ inputs.version }}
          prerelease: false
          files: /tmp/assets/*
          generate_release_notes: true

      - name: Delete Pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "v${{ inputs.version }}-pre" \
            --yes \
            --repo "${{ github.repository }}" \
            --cleanup-tag
