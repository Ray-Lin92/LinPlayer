org.gradle.jvmargs=-Xmx4096M -Djavax.net.ssl.trustStoreType=JKS -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true

# 禁用 Gradle 缓存，强制从网络获取（开发时建议开启，但构建时可能需要）
# org.gradle.caching=false

# 国内镜像源配置
systemProp.gradle.user.home=./gradle-user-home
systemProp.http.keepAlive=false

# 如果需要通过代理访问网络，取消下面注释并填写代理信息
# systemProp.http.proxyHost=127.0.0.1
# systemProp.http.proxyPort=7890
# systemProp.https.proxyHost=127.0.0.1
# systemProp.https.proxyPort=7890

# 国内镜像源（已配置在 build.gradle 中）
# 如仍无法下载，请开启代理或使用 VPN
