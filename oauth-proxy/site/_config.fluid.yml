favicon: /img/linplayer-icon.png
apple_touch_icon: /img/linplayer-icon.png
tab_title_separator: " ✦ "

navbar:
  blog_title: LinPlayer
  menu:
    - { key: 'home', name: '首页', link: '/', icon: 'iconfont icon-home-fill' }
    - { key: 'wiki', name: '文档', link: '/archives/', icon: 'iconfont icon-archive-fill' }
    - { key: 'categories', name: '分类', link: '/categories/', icon: 'iconfont icon-category-fill' }
    - { key: 'tags', name: '标签', link: '/tags/', icon: 'iconfont icon-tags-fill' }
    - { key: 'about', name: '关于', link: '/about/', icon: 'iconfont icon-user-fill' }

index:
  banner_img: https://bing.img.run/uhd.php
  slogan:
    enable: true
    text: 'LinPlayer 的像素放映厅 · 文档 / 插件 / 内核 / 灵感'
    api: false
  banner_img_height: 100
  banner_mask_alpha: 0.48

post:
  banner_img: https://bing.img.run/uhd.php
  banner_img_height: 72
  toc:
    enable: true
    placement: right
  copyright:
    enable: false

archive:
  banner_img: https://bing.img.run/uhd.php
  banner_img_height: 68

category:
  banner_img: https://bing.img.run/uhd.php
  banner_img_height: 68

tag:
  banner_img: https://bing.img.run/uhd.php
  banner_img_height: 68

about:
  banner_img: https://bing.img.run/uhd.php
  banner_img_height: 72

page:
  banner_img: https://bing.img.run/uhd.php
  banner_img_height: 68

footer:
  content: '<a href="https://github.com/zzzwannasleep/LinPlayer" target="_blank" rel="noopener">LinPlayer</a> · pixel dream archive · built with Hexo + Fluid'

dark_mode:
  enable: false

custom_js:
  - /js/pixel-dream.js

custom_css:
  - /css/pixel-dream.css
