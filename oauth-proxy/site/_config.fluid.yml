# Fluid 主题配置（仅覆盖关键项，未列出的走主题默认值）
# 文档：https://hexo.fluid-dev.com/docs/

# 顶部导航
navbar:
  blog_title: LinPlayer
  menu:
    - { key: 'home', link: '/', icon: 'iconfont icon-home-fill' }
    - { key: 'wiki', link: '/archives/', icon: 'iconfont icon-archive-fill' }
    - { key: 'categories', link: '/categories/', icon: 'iconfont icon-category-fill' }
    - { key: 'tags', link: '/tags/', icon: 'iconfont icon-tags-fill' }
    - { key: 'about', link: '/about/', icon: 'iconfont icon-user-fill' }

# 首页（落地页）
index:
  slogan:
    enable: true
    text: 'Emby 第三方多端播放器 · 移动 / 桌面 / TV'
    api: false
  banner_img_height: 100
  banner_mask_alpha: 0.3

# 文章页：开启目录树，便于当作 Wiki 阅读
post:
  toc:
    enable: true
    placement: right
  copyright:
    enable: false

# 全站页脚
footer:
  content: '<a href="https://github.com/zzzwannasleep/LinPlayer" target="_blank">LinPlayer</a> · 由 Hexo + Fluid 构建 · GitHub Pages 托管'

# 暗色模式按钮
dark_mode:
  enable: true
  default: auto
